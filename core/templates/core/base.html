{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}Zeezton Store{% endblock %}</title>

  <meta property="og:title" content="Zeezton Store | Repuestos BMW 🚗🔥">
  <meta property="og:description" content="Repuestos, accesorios y estilo exclusivo para tu BMW.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://zeezton.cl">
  <meta property="og:image" content="https://zeezton.cl/static/core/img/og-zeezton.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:ital@1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=BBH+Sans+Bartle&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'core/css/global.css' %}?v=2">
  <link rel="stylesheet" href="{% static 'core/css/navbar.css' %}?v=2">
  <link rel="stylesheet" href="{% static 'core/css/footer.css' %}?v=2">
  <link rel="stylesheet" href="{% static 'core/css/whatsapp.css' %}?v=2">
  <link rel="stylesheet" href="{% static 'core/css/popup.css' %}?v=2">

  {% block css %}{% endblock %}
</head>

<body>

  {% include "core/partials/navbar.html" %}

  <main>
    {% block main_content %}
    {% endblock %}
  </main>

  {% include "core/partials/footer.html" %}

  <a href="https://wa.me/56964333347"
     class="whatsapp-float"
     target="_blank"
     rel="noopener">
    <img src="{% static 'core/img/whatsapp.svg' %}" alt="WhatsApp">
  </a>

  {% include "core/partials/popup.html" %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  {% block js %}{% endblock %}

</body>
</html>
